{% set name = "minian" %}
{% set version = "2.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/minian-{{ version }}.tar.gz
  sha256: 2b4ee1325172abb024723330575cdeb83b19de06ff8f9e21270ff2a78f6056d4

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pdm-backend
    - pip
  run:
    - python >={{ python_min }}
    - bokeh >=1.4.0
    - cvxpy >=1.1.11
    - dask >=2025.1.0
    - datashader >=0.12.1
    - distributed >=2025.1.0
    - ecos >=2.0.7
    - ffmpeg
    - ffmpeg-python >=0.2.0
    - holoviews >=1.12.7
    - jinja2 >=2.11.3
    - jupyter
    - matplotlib-base
    - medpy >=0.4.0
    - natsort
    - netcdf4
    - networkx >=2.4
    - numba >=0.52.0
    - numpy >=1.20.2
    - opencv >=4.2.0.34
    - pandas >=1.2.3
    - panel >=0.8.0
    - pooch >=1.6.0
    - pyfftw >=0.12.0
    - rechunker >=0.3.3
    - scikit-image >=0.18.1
    - scikit-learn >=0.22.1
    - scipy >=1.4.1
    - scs
    - simpleitk >=2.0.2
    - sk-video
    - sparse >=0.11.2
    - statsmodels >=0.11.1
    - tifffile
    - typing_extensions >=4.0
    - xarray >=0.17.0
    - zarr

test:
  imports:
    - minian
  commands:
    - minian --help
    - minian-install --help
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/miniscope/minian
  summary: miniscope analysis pipeline with interactive visualizations
  license: GPL-3.0-or-later
  license_file: LICENSE
  doc_url: https://minian.readthedocs.io/
  dev_url: https://github.com/miniscope/minian
  description: |
    MiniAn is an analysis pipeline and visualization tool inspired by both
    CaImAn and MIN1PIPE package specifically for Miniscope data.

extra:
  recipe-maintainers:
    - zsinnema
    - phildong
    - daharoni
